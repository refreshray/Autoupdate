name: Update My M3U Playlist

on:
  schedule:
    # รันอัตโนมัติทุกวัน เวลา 00:00 น. (เวลา UTC) หรือ 07:00 น. เวลาไทย
    - cron: '0 0 * * *'
  workflow_dispatch: # ปุ่มกดรันเองแบบ Manual

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # อนุญาตให้เขียนไฟล์ลง Repo ได้

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # ใช้ token ของ GITHUB_TOKEN เพื่อให้สิทธิ์ในการ Push ปลอดภัยและผ่านฉลุย
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      run: python filter_m3u.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # หากไฟล์ชัวร์ว่าชื่อนี้ (ระวังเรื่องตัวพิมพ์เล็ก-ใหญ่)
        git add Update_playlist.m3u
        # ใส่ || echo "No changes to commit" เพื่อไม่ให้ Workflow ล่มเวลารันแล้วไม่มีช่องรายการอัปเดตใหม่
        git commit -m "Update playlist channels" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }}
